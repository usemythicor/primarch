name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            name: Windows
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            name: macOS
          - platform: ubuntu-22.04
            args: ''
            name: Linux

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libssh2-1-dev

      - name: Install dependencies (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          brew install openssl@3 libssh2

      - name: Set OpenSSL environment (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Primarch ${{ github.ref_name }}'
          releaseBody: |
            ## Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | **Windows** | `.msi` or `.exe` | MSI for enterprise, EXE for personal |
            | **macOS** | `.dmg` | Apple Silicon (M1/M2/M3/M4) |
            | **Linux** | `.AppImage` | Universal, runs on most distros |
            | **Linux (Debian/Ubuntu)** | `.deb` | Native package |

            > **Auto-updates:** Primarch will automatically notify you when new versions are available. Click the update button in the status bar to install.

            ---

            ### Installation

            **Windows:** Download and run the installer.

            **macOS:** Download the `.dmg`, open it, drag to Applications. On first run, right-click → Open to bypass Gatekeeper.

            **Linux AppImage:**
            ```bash
            chmod +x Primarch_*.AppImage
            ./Primarch_*.AppImage
            ```

            **Linux .deb:**
            ```bash
            sudo dpkg -i primarch_*.deb
            ```
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  sync-landing-version:
    runs-on: ubuntu-latest
    steps:
      - name: Update landing page version
        env:
          GH_PAT: ${{ secrets.LANDING_PAGE_PAT }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git clone https://x-access-token:${GH_PAT}@github.com/usemythicor/terminal-landing.git
          cd terminal-landing
          sed -i "s/v[0-9]*\.[0-9]*\.[0-9]*/v$VERSION/g" src/components/Hero.vue src/components/CTA.vue
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git commit -am "chore: bump version to v$VERSION" && git push)
