name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
            name: Windows
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            name: macOS (Apple Silicon)
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            name: macOS (Intel)
          - platform: ubuntu-22.04
            args: ''
            name: Linux

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libssh2-1-dev

      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install libssh2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Primarch ${{ github.ref_name }}'
          releaseBody: |
            ## Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | **Windows** | `.msi` or `.exe` | MSI for enterprise, EXE for personal |
            | **macOS (Apple Silicon)** | `_aarch64.dmg` | M1/M2/M3/M4 Macs |
            | **macOS (Intel)** | `_x64.dmg` | Older Intel Macs |
            | **Linux** | `.AppImage` | Universal, runs on most distros |
            | **Linux (Debian/Ubuntu)** | `.deb` | Native package |

            ---

            ### Installation

            **Windows:** Download and run the installer.

            **macOS:** Download the `.dmg`, open it, drag to Applications. On first run, right-click → Open to bypass Gatekeeper.

            **Linux AppImage:**
            ```bash
            chmod +x Primarch_*.AppImage
            ./Primarch_*.AppImage
            ```

            **Linux .deb:**
            ```bash
            sudo dpkg -i primarch_*.deb
            ```
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
